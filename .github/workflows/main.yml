name: Live Stream to Kick

on:
  workflow_dispatch: # يتيح لك تشغيل البث يدويًا بضغطة زر من الهاتف

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Start Streaming
      run: |
        ffmpeg -re -i "https://live-aligned.aljazeera.net/designres/aljazeera.m3u8" -c:v copy -c:a aac -f flv "${{ secrets.KICK_URL }}/${{ secrets.KICK_KEY }}"
